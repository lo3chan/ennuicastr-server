name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo_name
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ env.repo }}/ennuicastr:latest \
            -t ghcr.io/${{ env.repo }}/ennuicastr:${{ github.run_number }} \
            .

      - name: Push Docker Image to ghcr.io
        run: |
          docker push ghcr.io/${{ env.repo }}/ennuicastr:latest
          docker push ghcr.io/${{ env.repo }}/ennuicastr:${{ github.run_number }}

      - name: Archive Code
        run: |
          zip -r ennuicastr-server.zip . -x ".git/*" -x ".github/*"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Release v${{ github.run_number }}"
          draft: false
          prerelease: false
          files: ennuicastr-server.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
